<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日历任务管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航栏 -->
        <header class="app-header">
            <h1>日历任务管理</h1>
            <div class="header-actions">
                <button class="header-btn" id="todayBtn">今天</button>
                <button class="header-btn" id="exportBtn">导出</button>
                <button class="header-btn" id="importBtn">导入</button>
            </div>
        </header>

        <!-- 主内容区域 -->
        <main class="app-content">
            <!-- 日历视图 -->
            <section class="calendar-section">
                <div class="calendar-header">
                    <button class="month-nav prev">‹</button>
                    <h2 class="current-month" id="currentMonth"></h2>
                    <button class="month-nav next">›</button>
                </div>
                <div class="calendar-grid" id="calendarGrid">
                    <!-- 日历格子将通过JavaScript生成 -->
                </div>
                <div class="calendar-legend">
                    <div class="legend-item">
                        <div class="legend-dot"></div>
                        <span>有任务</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot completed"></div>
                        <span>已完成</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-today">今</div>
                        <span>今天</span>
                    </div>
                </div>
            </section>

            <!-- 任务列表 -->
            <section class="task-section" id="taskSection">
                <h3 class="task-date" id="taskDate"></h3>
                <div class="task-list" id="taskList">
                    <!-- 任务列表将通过JavaScript生成 -->
                </div>
                <button class="add-task-btn" id="addTaskBtn">+</button>
            </section>
        </main>

        <!-- 区间操作面板 (Bottom Sheet) -->
        <div class="range-panel" id="rangePanel">
            <div class="range-header">
                <p>已选：<span id="rangeInfo"></span></p>
                <button class="close-range-btn" id="closeRangePanel">&times;</button>
            </div>
            <div class="range-actions">
                <button class="range-btn add" id="batchAddBtn">批量添加任务</button>
                <button class="range-btn complete" id="batchCompleteBtn">批量标记完成</button>
                <button class="range-btn delete" id="batchDeleteBtn">批量删除</button>
            </div>
        </div>

        <!-- 批量添加任务弹窗 -->
        <div class="modal" id="batchAddModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>批量添加任务</h3>
                    <button class="close-btn" id="closeBatchAddModal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="modal-range-info" id="modalRangeInfo"></div>
                    <textarea class="task-input" id="taskInput" placeholder="每行一个任务，自动换行分隔"></textarea>
                </div>
                <div class="modal-footer">
                    <button class="modal-btn cancel" id="cancelBatchAdd">取消</button>
                    <button class="modal-btn confirm" id="confirmBatchAdd">确认添加</button>
                </div>
            </div>
        </div>

        <!-- 批量操作确认弹窗 -->
        <div class="modal" id="confirmModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="confirmTitle"></h3>
                    <button class="close-btn" id="closeConfirmModal">&times;</button>
                </div>
                <div class="modal-body">
                    <p id="confirmMessage"></p>
                </div>
                <div class="modal-footer">
                    <button class="modal-btn cancel" id="cancelConfirm">取消</button>
                    <button class="modal-btn confirm" id="confirmAction">确认</button>
                </div>
            </div>
        </div>

        <!-- 导出导入弹窗 -->
        <div class="modal" id="exportImportModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="exportImportTitle"></h3>
                    <button class="close-btn" id="closeExportImportModal">&times;</button>
                </div>
                <div class="modal-body">
                    <textarea class="task-input" id="exportImportText" placeholder="在此复制或粘贴任务数据"></textarea>
                    <div id="exportImportInfo" class="modal-range-info"></div>
                </div>
                <div class="modal-footer">
                    <button class="modal-btn cancel" id="cancelExportImport">取消</button>
                    <button class="modal-btn confirm" id="confirmExportImport">确认</button>
                </div>
            </div>
        </div>

        <!-- 单个任务添加弹窗 -->
        <div class="modal" id="addTaskModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>添加任务</h3>
                    <button class="close-btn" id="closeAddTaskModal">&times;</button>
                </div>
                <div class="modal-body">
                    <textarea class="task-input" id="singleTaskInput" placeholder="每行一个任务，自动换行分隔"></textarea>
                </div>
                <div class="modal-footer">
                    <button class="modal-btn cancel" id="cancelAddTask">取消</button>
                    <button class="modal-btn confirm" id="confirmAddTask">确认添加</button>
                </div>
            </div>
        </div>

        <!-- 遮罩层 -->
        <div class="overlay" id="overlay"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
